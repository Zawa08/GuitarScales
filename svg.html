<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <svg id="canvas" width="350" height="450"></svg>
    <script>
      const svgNS = "http://www.w3.org/2000/svg";

      function createCircle(x, y, radius, color) {
        const circle = document.createElementNS(svgNS, "circle");
        const colors = ["red", "green", "blue", "orange", "purple", "black"];
        circle.setAttribute("cx", x);
        circle.setAttribute("cy", y);
        circle.setAttribute("r", radius);
        circle.setAttribute("stroke", "black");
        circle.setAttribute("stroke-width", 1);
        circle.setAttribute("fill", colors[color]);
        return circle;
      }

      function createLine(x1, y1, x2, y2, strokeWidth) {
        const line = document.createElementNS(svgNS, "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("stroke", "black");
        line.setAttribute("stroke-width", strokeWidth);
        return line;
      }

      function writeNumber(x, y, number) {
        const text = document.createElementNS(svgNS, "text");
        const fontSize = 30;
        text.style.fontSize = fontSize;
        text.setAttribute("fill", "white");
        text.setAttribute("x", x - fontSize / 4);
        text.setAttribute("y", y + fontSize / 3);
        text.innerHTML = number;
        return text;
      }

      function createDiagram() {
        const svg = document.getElementById("canvas");
        const initXPos = 50;
        const circleYPos = 100;
        const strokeWidth = 1;
        for (let i = 0; i < 4; i++) {
          let fretXPos = initXPos + i * 100;
          svg.appendChild(
            createLine(
              initXPos - strokeWidth / 2,
              fretXPos,
              300 + strokeWidth / 2,
              fretXPos,
              strokeWidth,
            ),
          );
        }

        for (let i = 0; i < 6; i++) {
          let stringXPos = initXPos + i * 50;
          svg.appendChild(
            createLine(stringXPos, initXPos, stringXPos, 350, strokeWidth),
          );
          svg.appendChild(createCircle(stringXPos, circleYPos, 20, i));
          svg.appendChild(writeNumber(stringXPos, circleYPos, i.toString()));
        }
      }

      createDiagram();
    </script>
  </body>
</html>
