<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <svg id="canvas" width="350" height="300"></svg>
    <script>
      const svgNS = "http://www.w3.org/2000/svg";

      function createCircle(x, y, radius, color) {
        const circle = document.createElementNS(svgNS, "circle");
        circle.setAttribute("cx", x);
        circle.setAttribute("cy", y);
        circle.setAttribute("r", radius);
        circle.setAttribute("fill", color);
        return circle;
      }

      function createLine(x1, y1, x2, y2, strokeWidth) {
        const line = document.createElementNS(svgNS, "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("stroke", "black");
        line.setAttribute("stroke-width", 5);
        return line;
      }

      function writeNumber(x, y, number) {
        const text = document.createElementNS(svgNS, "text");
        const fontSize = 25;
        text.style.fontSize = fontSize;
        text.setAttribute("x", x - fontSize);
        text.setAttribute("y", y);
        text.innerHTML = number;
        return text;
      }

      function createDiagram() {
        const svg = document.getElementById("canvas");
        const initXPos = 50;
        const circleYPos = 150;
        for (let i = 0; i < 6; i++) {
          let stringXPos = initXPos + i * 50;
          svg.appendChild(createLine(stringXPos, 0, stringXPos, 300, 2));
          svg.appendChild(createCircle(stringXPos, circleYPos, 20, "green"));
          svg.appendChild(writeNumber(stringXPos, circleYPos, i.toString()));
        }
      }

      createDiagram();
    </script>
  </body>
</html>
